# sales-playbook 스킬 테스트 케이스
# Producer-Reviewer 패턴 기반 영업 플레이북 자동 생성 스킬

test_cases:
  - id: TC-001
    name: Happy Path - SaaS 제품 영업 플레이북 생성
    description: |
      표준 입력값(회사명, 산업, 제품, 목표)이 모두 제공된 경우,
      완전한 영업 플레이북이 생성되는지 검증합니다.
    input:
      company_name: 삼정물산
      target_industry: 물류/유통
      product_info: AI 기반 물류 최적화 SaaS (월 구독형, 직원 50인 이상 기업 타겟)
      sales_goal: 3개월 내 5개사 계약 성사, 평균 계약 금액 500만원/월
    expected_outputs:
      - 타겟 기업 분석 섹션 존재 (기업 개요, 비즈니스 모델, 시장 위치, 조직도)
      - 접근 전략 섹션 존재 (채널 우선순위, 초기 접근 메시지, 최적 접근 타이밍)
      - 이의처리 시나리오 섹션 존재 (5개 이상의 예상 이의사항과 대응 스크립트)
      - 성공 지표 섹션 존재 (리드 생성, 미팅 확보, 제안 전송, 계약 성사 지표)
      - 실행 체크리스트 섹션 존재
      - Markdown 형식 구조화된 문서
    pass_criteria:
      - 모든 필수 섹션(6개)이 존재하고 내용이 구체적임
      - 타겟 산업(물류/유통)에 맞는 맞춤형 전략 포함
      - SaaS 구독 모델에 적합한 접근 전략과 이의처리 스크립트 포함
      - 영업 목표(3개월 5개사)에 부합하는 성공 지표 제시
      - 문서 길이가 150+ 라인 (Complex 스킬 기준)

  - id: TC-002
    name: Edge Case - 최소 입력값으로 플레이북 생성
    description: |
      최소한의 입력값(산업군만 제공, 특정 기업명 미제공)으로도
      기본적인 플레이북 구조가 생성되는지 검증합니다.
    input:
      company_name: null
      target_industry: 핀테크
      product_info: B2B 대출 플랫폼 (수수료 모델)
      sales_goal: 6개월 내 10개사 계약
    expected_outputs:
      - 타겟 기업 분석 섹션 존재 (단, "일반적인 핀테크 기업"으로 가정)
      - 접근 전략 섹션 존재 (핀테크 산업 일반적 채널 중심)
      - 이의처리 시나리오 섹션 존재 (금융 규제, 보안 관련 이의사항 포함)
      - 성공 지표 섹션 존재
      - 실행 체크리스트 섹션 존재
    pass_criteria:
      - 최소 입력값으로도 모든 필수 섹션이 생성됨
      - "일반적인 [산업] 기업"으로 가정하고 분석 진행
      - 핀테크 산업 특성(규제, 보안, 신뢰)을 반영한 전략 포함
      - 특정 기업명이 없어도 실전 활용 가능한 수준의 구체성 유지

  - id: TC-003
    name: Complex Input - 공공기관 입찰 영업 플레이북 생성
    description: |
      복잡한 입력값(공공기관 타겟, 입찰 프로세스, 경쟁사 정보 포함)을
      처리하여 정교한 플레이북이 생성되는지 검증합니다.
    input:
      company_name: 코레일테크 (가상의 철도기관 자회사)
      target_industry: 공공/국내 대기관
      product_info: 철도역 스마트 주차 관리 플랫폼 (初期 설치비 5천만원 + 월 유지보수 100만원)
      sales_goal: 공공 입찰 참여 우승, 3개 역 시범 도입 후 전국 확장
      competitors: 현대주차시스템, 도화주차
      special_constraints:
        - 공공조달 입찰 프로세스 준수
        - 기술 검증 및 시범 사업 필요
        - 예산 편성 주기: 연초
    expected_outputs:
      - 타겟 기업 분석 섹션 (공공기관 특성: 입찰 프로세스, 예산 주기, 기술 검증 중시)
      - 접근 전략 섹션 (입찰 정보 모니터링, 시범 사업 제안, 기술 시연 중심)
      - 이의처리 시나리오 섹션 (기술 검증, 예산 부족, 내부 개발, 입찰 우려)
      - 성공 지표 섹션 (입찰 참여 횟수, 낙찰률, 시범 운영 성공률, 확장 계약 수)
      - 실행 체크리스트 섹션 (입찰 일정별 체크리스트)
      - 경쟁사 분석 포함 (현대주차시스템, 도화주차 대비 차별점)
    pass_criteria:
      - 공공기관 특화 전략(입찰, 시범 사업, 예산 주기)이 포함됨
      - 경쟁사 정보가 반영된 이의처리 스크립트 제공
      - 3단계 접근 전략(입찰 참여 → 시범 도입 → 전국 확장)이 구체적으로 제시됨
      - 입찰 프로세스 특성을 고려한 성공 지표(낙찰률, 시범 운영 성공률) 포함
      - 문서 길이가 200+ 라인 (복잡한 입력값 반영)

test_execution_notes:
  - 모든 테스트 케이스는 `gil:ai-slop-reviewer` 후처리 전을 기준으로 평가합니다.
  - 후처리 후 최종 출력물 품질은 별도 점검이 필요합니다.
  - TC-001은 표준 사용자 시나리오를 커버합니다.
  - TC-002은 최소 입력값 경계 조건을 테스트합니다.
  - TC-003은 복잡한 실제 시나리오(공공기관 입찰)를 커버합니다.

pass_threshold:
  - 최소 통과 기준: 모든 필수 섹션 존재 + 내용 구체성
  - 완벽 통과 기준: 산업/제품/목표에 맞는 맞춤형 전략 + 수치 기반 지표 + 150+ 라인
