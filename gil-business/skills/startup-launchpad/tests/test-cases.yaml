# startup-launchpad 스킬 테스트 케이스
# Hierarchical Delegation 패턴 기반 스타트업 종합 계획 수립 스킬

test_cases:
  - id: TC-001
    name: Happy Path - B2B SaaS 스타트업 계획 수립
    description: |
      표준 입력값(아이디어, 시장, 팀, 자본)이 모두 제공된 경우,
      완전한 종합 계획서가 생성되는지 검증합니다.
    input:
      startup_name: AI옵틱스
      idea: 중소 제조업체를 위한 AI 기반 생산 최적화 SaaS
      target_market: 국내 중소 제조업체 (직원 10-100인, 연 매출 10-100억원)
      team_info:
        - CEO: 제조업 컨설팅 10년
        - CTO: AI/ML 8년
      initial_capital: 3억원 (팀 자출 1억원 + 엔젤 투자 2억원)
    expected_outputs:
      - 아이디어 검증 섹션 존재 (문제 정의, 솔루션, 타겟 고객, 경쟁 Landscape, 실행 가능성)
      - 시장 분석 섹션 존재 (TAM/SAM/SOM, 성장성, 고객 세분화, 진입 장벽)
      - 비즈니스 모델 캔버스 섹션 존재 (9개 빌딩 블록, 수익 모델, 가격 책정)
      - 피치덱 구조 섹션 존재 (10-15슬라이드 구성, 각 슬라이드 핵심 메시지)
      - 재무 모델 섹션 존재 (3개년 손익계산서, 현금흐름표, 주요 지표, 투자 요청액)
      - 실행 로드맵 섹션 존재 (Q1-Q4 분기별 Milestone, 성공 지표)
      - Markdown 형식 구조화된 문서
    pass_criteria:
      - 모든 필수 섹션(6개)이 존재하고 내용이 구체적임
      - B2B SaaS 특성(SaaS 구독 모델, 직접 영업, 중소 제조업체 타겟)이 반영됨
      - 재무 모델에 3개년 추정과 손익분기 분석 포함
      - 피치덱 구조에 10-15슬라이드 포함
      - 실행 로드맵에 4분기(Q1-Q4) 계획 포함
      - 문서 길이가 200+ 라인 (Complex 스킬 기준)

  - id: TC-002
    name: Edge Case - 최소 팀 정보로 계획 수립
    description: |
      최소한의 입력값(1인 창업, 단순 아이디어)으로도
      기본적인 계획서 구조가 생성되는지 검증합니다.
    input:
      startup_name: 펫케어
      idea: 반려동물 유기농 사료 D2C 브랜드
      target_market: 반려동물 보유 1인 가구
      team_info:
        - CEO: 이커머스 운영 5년
      initial_capital: 1억원 (팀 자출 1억원)
    expected_outputs:
      - 아이디어 검증 섹션 존재 (단, 팀 역량 제한 고려)
      - 시장 분석 섹션 존재 (TAM/SAM/SOM 추정)
      - 비즈니스 모델 캔버스 섹션 존재 (1인 창업에 맞는 간소화 모델)
      - 피치덱 구조 섹션 존재 (10슬라이드 기본 구성)
      - 재무 모델 섹션 존재 (단, 초기 자본 1억원 기반 보수적 추정)
      - 실행 로드맵 섹션 존재 (1인 창업 고려 단순화 로드맵)
    pass_criteria:
      - 최소 입력값으로도 모든 필수 섹션이 생성됨
      - 1인 창업 특성(자원 제한, 단순화 모델)이 반영됨
      - 초기 자본 1억원에 맞는 보수적 재무 추정 포함
      - 팀 빌딩 필요성이 실행 로드맵에 명시됨
      - 특정 전문가(CTO, CMO 등) 부족에 대한 리스크 분석 포함

  - id: TC-003
    name: Complex Input - Deep Tech 스타트업 계획 수립
    description: |
      복잡한 입력값(Deep Tech, 연구 성과 기반, 대형 초기 자본, 다차원 시장)을
      처리하여 정교한 계획서가 생성되는지 검증합니다.
    input:
      startup_name: 퀀텀바이오
      idea: 양자 컴퓨팅 기반 신약 개발 플랫폼
      target_market:
        - primary: 제약사 신약 개발 부서
        - secondary: 바이오 벤처
        - tertiary: 연구소
      team_info:
        - CEO: 제약사 R&D 15년, 박사
        - CTO: 양자 컴퓨팅 12년, 박사
        - CSO: 분자 생물학 10년, 박사
        - CBO: 바이오 투자 8년
      initial_capital: 20억원 (팀 자출 5억 + 시리즈 A 15억)
      special_considerations:
        - 기술 TRL 6단계 (연구실 검증 완료)
        - 특허 3건 보유
        - 제약사 2사와 PoC 진행 중
        - 규제 승인 필요 (FDA)
    expected_outputs:
      - 아이디어 검증 섹션 (Deep Tech 특성: 높은 기술 진입 장벽, 장기 개발 주기)
      - 시장 분석 섹션 (다차원 시장: 제약사, 바이오 벤처, 연구소)
      - 비즈니스 모델 캔버스 섹션 (B2B 엔터프라이즈 모델, 라이선싱 + SaaS 하이브리드)
      - 피치덱 구조 섹션 (15슬라이드, 기술 우위 강조, 특허, PoC 성과 포함)
      - 재무 모델 섹션 (장기 투자 반영, 5개년 추정, Series B/C 계획)
      - 실행 로드맵 섹션 (규제 승인 로드맵, 제약사 파트너십, 글로벌 확장)
      - Deep Tech 특화 리스크 분석 (기술 리스크, 규제 리스크, 자금 조달 리스크)
    pass_criteria:
      - Deep Tech 특성(높은 기술 진입 장벽, 장기 개발 주기)이 반영됨
      - 다차원 시장(제약사, 바이오 벤처, 연구소)이 각각 분석됨
      - 특허 3건, PoC 성과가 피치덱에 강조됨
      - 규제 승인(FDA) 로드맵이 실행 계획에 포함됨
      - 재무 모델에 5개년 추정과 Series B/C 계획 포함
      - 문서 길이가 250+ 라인 (복잡한 입력값 반영)

test_execution_notes:
  - 모든 테스트 케이스는 `gil:ai-slop-reviewer` 후처리 전을 기준으로 평가합니다.
  - 후처리 후 최종 출력물 품질은 별도 점검이 필요합니다.
  - TC-001은 표준 B2B SaaS 스타트업 시나리오를 커버합니다.
  - TC-002는 최소 입력값 경계 조건(1인 창업, 소액 자본)을 테스트합니다.
  - TC-003는 복잡한 Deep Tech 스타트업 시나리오를 커버합니다.

pass_threshold:
  - 최소 통과 기준: 모든 필수 섹션 존재 + 내용 구체성
  - 완벽 통과 기준: 스타트업 유형별 맞춤형 전략 + 수치 기반 재무 모델 + 200+ 라인
