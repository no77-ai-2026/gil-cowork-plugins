# target-script 스킬 테스트 케이스
# Pipeline 패턴 기반 타겟 고객 맞춤 메시징 스크립트 생성 스킬

test_cases:
  - id: TC-001
    name: Happy Path - B2B SaaS 제품 타겟 스크립트 생성
    description: |
      표준 입력값(타겟 고객, 제품, 캠페인 목표, 채널)이 모두 제공된 경우,
      완전한 타겟 스크립트가 생성되는지 검증합니다.
    input:
      target_audience: 중소 제조업체 경영진 (CEO, 생산관리자, 연 매출 10-100억원)
      product: AI 기반 생산 최적화 SaaS (생산 비용 15% 절감)
      campaign_goal: 무료 체험 신청 유도 (30일 무료 체험)
      channels:
        - email
        - linkedin
        - landing_page
    expected_outputs:
      - 타겟 오디언스 분석 섹션 존재 (Buyer Persona, 심리적 특성, 페인포인트, 욕구)
      - 페인포인트 도출 섹션 존재 (3-5개 핵심 페인포인트, 심각성 평가)
      - 핵심 메시지 섹션 존재 (가치 제안, AIDA 모델, PAS 모델, 톤앤매너)
      - 채널별 스크립트 섹션 존재 (이메일, LinkedIn, 랜딩 페이지)
      - A/B 테스트 제안 섹션 존재 (테스트 변형, 가설, 성공 지표)
      - Markdown 형식 구조화된 문서
    pass_criteria:
      - 모든 필수 섹션(5개)이 존재하고 내용이 구체적임
      - B2B 특성(경영진 타겟, 비용 절감, 전문적 톤)이 반영됨
      - 각 채널의 길이 제한을 준수하는 스크립트 포함
      - 페인포인트가 타겟 고객의 언어로 표현됨
      - CTA가 구체적이고 행동 지향적임
      - 문서 길이가 80-150 라인 (Standard 스킬 기준)

  - id: TC-002
    name: Edge Case - 단일 채널(이메일만) 타겟 스크립트 생성
    description: |
      최소한의 입력값(단일 채널)으로도
      기본적인 스크립트 구조가 생성되는지 검증합니다.
    input:
      target_audience: 2030 여성, 반려동물 보유 1인 가구
      product: 프리미엄 반려동물 유기농 사료 (100% 유기농, 无添加剂)
      campaign_goal: 첫 구매 유도 (첫 구매 20% 할인)
      channels:
        - email
    expected_outputs:
      - 타겟 오디언스 분석 섹션 존재 (2030 여성, 반려동물 보유 특성)
      - 페인포인트 도출 섹션 존재 (添加剂 우려, 가격 부담, 신뢰 부족)
      - 핵심 메시지 섹션 존재 (유기농, 无添加剂, 안심)
      - 채널별 스크립트 섹션 존재 (이메일 스크립트만)
      - A/B 테스트 제안 섹션 존재 (이메일 제목/CTA 변형)
    pass_criteria:
      - 단일 채널로도 모든 필수 섹션이 생성됨
      - 이메일 스크립트에 제목, 본문, CTA, 서명 포함
      - 2030 여성 타겟에 맞는 친근한 톤앤매너 반영
      - 이메일 길이 제한(제목 50자, 본문 200자) 준수
      - A/B 테스트가 이메일에 집중됨

  - id: TC-003
    name: Complex Input - 멀티 채널(4개) 타겟 스크립트 생성
    description: |
      복잡한 입력값(4개 채널, 다양한 타겟 세그먼트, A/B 테스트 다변수)을
      처리하여 정교한 스크립트가 생성되는지 검증합니다.
    input:
      target_audience:
        - primary: 3040 직장인, 건강 관심 높음
        - secondary: 5060 은퇴 준비기, 예방 의료 선호
      product: AI 기반 건강 관리 앱 (혈당/혈압 실시간 모니터링 + AI 추천)
      campaign_goal: 유료 구독 전환 (월 9,900원, 1개월 무료 체험 후)
      channels:
        - email
        - instagram
        - twitter
        - landing_page
      special_requirements:
        - 2개 타겟 세그먼트별 메시지 다름
        - 긴급성 강조 (9월 30일까지 20% 할인)
        - 건강 데이터 보안 강조 (HIPAA 준수)
    expected_outputs:
      - 타겟 오디언스 분석 섹션 (2개 세그먼트 각각 분석)
      - 페인포인트 도출 섹션 (건강 관리 어려움, 데이터 우려, 비용 부담)
      - 핵심 메시지 섹션 (건강 관리 혁신, 데이터 보안, 긴급성)
      - 채널별 스크립트 섹션 (4개 채널 모두)
        - 이메일: 2개 세그먼트별 버전
        - Instagram: 3040 타겟, 시각적 훅 강조
        - Twitter: 5060 타겟, 짧고 간결한 메시지
        - 랜딩 페이지: 2개 세그먼트별 헤드라인
      - A/B 테스트 제안 섹션 (다변수 테스트)
        - 헤드라인 A/B (혁신 vs 안전)
        - CTA A/B (지금 시작 vs 무료 체험)
        - 긴급성 A/B (있음 vs 없음)
        - 세그먼트 A/B (3040 vs 5060)
      - 데이터 보안 강조 (HIPAA 준수, 암호화)
      - Markdown 형식 구조화된 문서
    pass_criteria:
      - 2개 타겟 세그먼트가 각각 분석되고 메시지가 다름
      - 4개 채널 모두에 맞춤형 스크립트 포함
      - 각 채널의 길이 제한과 형식을 준수
      - 긴장성 강조(9월 30일까지 20% 할인)이 모든 채널에 포함
      - 데이터 보안(HIPAA 준수)이 신뢰 요소로 강조됨
      - A/B 테스트가 4개 차원(헤드라인, CTA, 긴급성, 세그먼트)으로 다변수 설계됨
      - 문서 길이가 150+ 라인 (복잡한 입력값 반영)

test_execution_notes:
  - 모든 테스트 케이스는 `gil:ai-slop-reviewer` 후처리 전을 기준으로 평가합니다.
  - 후처리 후 최종 출력물 품질은 별도 점검이 필요합니다.
  - TC-001은 표준 B2B SaaS 시나리오를 커버합니다.
  - TC-002는 최소 입력값 경계 조건(단일 채널)을 테스트합니다.
  - TC-003는 복잡한 멀티 채널 시나리오를 커버합니다.

pass_threshold:
  - 최소 통과 기준: 모든 필수 섹션 존재 + 내용 구체성
  - 완벽 통과 기준: 채널별 맞춤형 스크립트 + 수치 기반 CTA + A/B 테스트 제안 + 100+ 라인
